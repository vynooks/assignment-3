<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggy Daycare</title>
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
<header class="flex">
    <img src="../images/dog.png" alt="outline of a dog's face with heart above it">
    <h1><a href="../index.html">Delilah's Doggy Daycare</a></h1>
</header>
    <main>
    <section class="booking-page">
        <h2>Booking Rate Calculator</h2>
            <p>My pup will come in on</p>
            <ul>
                <li>Mon</li>
                <li>Tue</li>
                <li>Wed</li>
                <li>Thu</li>
                <li>Fri</li>
            </ul>
                <p>for <button class="full">full</button> or <button class="half">half days</button><div class=""></div>
                <p class="top-margin">My weekly cost will be $0.</p>
                <button class="small-button blue-hover clear-days top-margin">clear days</button>
    </section>
    </main>
    <footer>
        <p>Dog icons created by <a href="https://www.flaticon.com/free-icons/dog">Freepik - Flaticon</a><br>
        Photo by <a href="https://unsplash.com/photos/NE0XGVKTmcA">Karsten Winegeart</a> on Unsplash</p>
    </footer>
   <script src="../scripts/script.js"></script> 
</body>
</html>
