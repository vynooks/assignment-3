<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggy Daycare</title>
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header class="flex">
        <img src="../images/dog.png" alt="outline of a dog's face with heart above it">
        <h1><a href="../index.html">Delilah's Doggy Daycare</a></h1>
    </header>
<section class="contact-page">
  <form class="contact-form">
    <div class="labels">
      <label for="name">Your name:</label>
      <label for="email">Your email:</label>
      <label for="message">Your message:</label>
    </div>
    <div class="inputs">
      <input id="name" type="text">
      <input id="email" type="email">
      <textarea id="message"></textarea>
      <button class="clicked" type="submit">Good dog!</button>
    </div>
  </form>
</section>
    <footer class="flex">
        <p>Dog icons created by <a href="https://www.flaticon.com/free-icons/dog">Freepik - Flaticon</a><br>
        Photo by <a href="https://unsplash.com/photos/NE0XGVKTmcA">Karsten Winegeart</a> on Unsplash</p>
    </footer>
   <script src="../scripts/script.js"></script> 
</body>
</html>
